spring.application.name=sistema-catalogo

#CONFIGURAÇÕES MONGODB
spring.data.mongodb.uri=mongodb://localhost:27017/sistema-catalogo
spring.data.mongodb.auto-index-creation=true
# Logging - Mostrar operações do MongoDB
logging.level.root=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.data.mongodb.core=DEBUG
logging.level.org.mongodb.driver=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

#CONFIGURAÇÕES JPA
spring.datasource.url=jdbc:mysql://localhost:3306/sistema-catalogo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root01
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database=mysql
spring.jpa.show-sql=true